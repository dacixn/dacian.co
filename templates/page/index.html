<!doctype html>
<head>
  <title>home</title>
  <link rel="stylesheet" href="/static/style.css" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, user-scalable=no"
  />
  <meta charset="UTF-8" />
  <script
    src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
    integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
    crossorigin="anonymous"
  ></script>
</head>
<body>
  <div
    id="hide-content"
    style="
      position: absolute;
      z-index: 2000;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #fff2f6;
    "
  ></div>
  <div class="wrapper">
    <div class="grid">
      <div id="header" class="grid-item title">
        <h1 class="">dacian c.</h1>
        <p>
          aspiring designer and engineer<br />
          based in
          <span class="grow-text"
            ><a href="https://www.aruba.com/us">aruba</a></span
          >
        </p>
      </div>
      <div class="grid-item music" hx-get="/music" hx-trigger="load, every 30s">
        <img src="https://placehold.co/125x125" />
        <!-- music template -->
        <div class="music-info">
          <h2>title</h2>
          <p id="artist">artist</p>
          <span class="triangle">♫</span>
        </div>
      </div>
      <a href="/software">
        <div class="subsection-grid-item services grow">
          <h2>software</h2>
          <p>self-hosted goodies</p>
          <span class="triangle-dark">◢</span>
        </div>
      </a>
      <a href="/projects">
        <div class="subsection-grid-item projects grow">
          <h2>projects</h2>
          <p>check out what i'm working on</p>
          <span class="triangle-dark">◢</span>
        </div>
      </a>
      <div class="grid-item contact">
        <h2>contact</h2>
        <p>
          send an email to<br /><span class="email selectable"
            >hello[at]dacian[dot]co</span
          ><br />to get in touch
        </p>
      </div>
      <!-- server template -->
      <div class="grid-item server" hx-get="/stats" hx-trigger="load, every 30s">
        <h2>server</h2>
        <div class="data-table">
          <div class="data-row">
            <span class="data-type">memory</span>
            <span class="data-value">0.0/0.0GB</span>
          </div>
          <div class="data-row">
            <span class="data-type">cpu</span>
            <span class="data-value">0%</span>
          </div>
          <div class="data-row">
            <span class="data-type">uptime</span>
            <span class="data-value">0 days</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
