<h2>server</h2>
<div class="data-table">
  <div class="data-row">
    <span class="data-type">memory</span>
    <span class="data-value"
      >{{ .Memory }}</span
    >
  </div>
  <div class="data-row">
    <span class="data-type">cpu</span>
    <span class="data-value">{{ .CPU }}</span>
  </div>
  <div class="data-row">
    <span class="data-type">uptime</span>
    <span class="data-value"
      >{{ .Uptime }}</span
    >
  </div>
</div>
